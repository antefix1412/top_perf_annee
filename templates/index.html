<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Top FFTT - version web" />
    <title>Top FFTT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
  </head>
  <body data-club="{{ club_num }}">
    <main class="page-shell">
      <section class="app-card">
        <header class="app-header">
          <div class="app-title-row">
            <span class="app-emoji" aria-hidden="true">🏓</span>
            <h1>Progression FFTT</h1>
          </div>
        </header>

        <section class="toolbar">
          <button id="load-btn" class="primary">↻ Afficher Les Progressions</button>
          <button id="copy-btn" class="secondary">📋 Copier tout</button>
          <div class="status-pill" id="status-badge">Prêt</div>
        </section>

        <section class="table-section">
          <div class="table-wrap">
            <table class="results-table">
              <thead>
                <tr>
                  <th>Prénom</th>
                  <th>Nom</th>
                  <th>Points officiels</th>
                  <th>Points virtuels</th>
                  <th>Progression</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr class="empty-row">
                  <td colspan="5">Aucune donnée à afficher</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <footer class="app-footer">
          <span id="club-number">{{ club_num }}</span>
          <span id="result-count">0</span>
          <span id="last-updated">-</span>
        </footer>
      </section>
    </main>
  </body>
</html>
