<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Top FFTT - version web" />
    <title>Top FFTT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
  </head>
  <body data-club="{{ club_num }}">
    <main class="page-shell">
      <section class="app-card">
        <header class="app-header">
          <div class="app-title-row">
            <span class="app-emoji" aria-hidden="true">🏓</span>
            <h1>Top des performances</h1>
          </div>
        </header>

        <section class="toolbar">
          <button id="load-btn" class="primary">Charger le Top</button>
          <button id="copy-btn" class="ghost">Copier</button>
          <div class="status-pill" id="status-badge">Pret</div>
        </section>

        <section class="search-panel">
          <div class="search-grid single-field">
            <label class="search-field search-field-full">
              <span>Prénom et nom</span>
              <input id="search-name" type="text" list="fullnames-list" placeholder="Ex: Noah BARIL" autocomplete="off" />
            </label>
          </div>
          <div class="search-actions">
            <button id="search-btn" class="secondary">Rechercher</button>
            <button id="reset-search-btn" class="ghost">Afficher tout</button>
          </div>
          <datalist id="fullnames-list"></datalist>
        </section>

        <section class="table-section">
          <div class="table-wrap">
            <table class="results-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Joueur</th>
                  <th>Points joueur</th>
                  <th>Points adversaire</th>
                  <th>Ecart</th>
                </tr>
              </thead>
            </table>
          </div>
        </section>

        <footer class="app-footer">
          <span class="eyebrow">FFTT / web app</span>
          <span id="club-number">{{ club_num }}</span>
          <span id="result-count">0</span>
        </footer>
      </section>
    </main>
  </body>
</html>
